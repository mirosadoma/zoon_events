name: Phase 0 CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: zonetec_testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: sodium
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: composer install --no-interaction --prefer-dist
      - run: npm ci
      - run: cp .env.testing .env
      - run: php artisan key:generate
      - run: php artisan zonetec:config:validate
      - run: php artisan migrate:fresh --force
      - run: composer validate --strict
      - run: vendor/bin/pint --test
      - run: php artisan test
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: php scripts/sync-openapi.php --check
      - run: php artisan zonetec:docs:check
      - run: php artisan zonetec:phase-boundary:check
