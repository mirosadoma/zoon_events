name: Phase 0 CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install native MySQL
        run: sudo apt-get update && sudo apt-get install -y mysql-server && sudo systemctl start mysql
      - name: Create test database
        run: sudo mysql -e "CREATE DATABASE zonetec_testing; CREATE USER 'zonetec'@'localhost' IDENTIFIED BY 'ci-synthetic-password'; GRANT ALL ON zonetec_testing.* TO 'zonetec'@'localhost';"
      - run: composer install --no-interaction --prefer-dist
      - run: npm ci
      - run: cp .env.testing .env
      - run: php artisan key:generate
      - run: php artisan zonetec:config:validate
      - run: php artisan migrate:fresh --force
      - run: composer validate --strict
      - run: vendor/bin/pint --test
      - run: php artisan test
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: php scripts/sync-openapi.php --check
      - run: php artisan zonetec:docs:check
      - run: php artisan zonetec:phase-boundary:check
