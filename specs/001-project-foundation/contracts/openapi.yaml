components:
  securitySchemes:
    sanctum:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
  headers:
    CorrelationId:
      description: Effective request correlation identifier
      schema:
        type: string
        minLength: 1
        maxLength: 64
  parameters:
    TenantHeader:
      name: X-Tenant-ID
      in: header
      required: true
      description: Active tenant selected for this operation; verified against membership.
      schema:
        $ref: '#/components/schemas/Ulid'
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Caller-generated key bound to actor, scope, operation, and request.
      schema:
        type: string
        minLength: 16
        maxLength: 255
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
        maxLength: 2048
    From:
      name: from
      in: query
      required: true
      schema:
        type: string
        format: date-time
    To:
      name: to
      in: query
      required: true
      schema:
        type: string
        format: date-time
    AuditAction:
      name: action
      in: query
      schema:
        type: string
        maxLength: 160
    AuditOutcome:
      name: outcome
      in: query
      schema:
        type: string
        enum: [succeeded, denied, failed]
    TenantPathId:
      name: tenant_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Ulid'
    UserPathId:
      name: user_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Ulid'
    MembershipPathId:
      name: membership_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Ulid'
    RolePathId:
      name: role_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Ulid'
    AssignmentPathId:
      name: assignment_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Ulid'
    ExportPathId:
      name: export_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Ulid'
    FlagKey:
      name: flag_key
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-z][a-z0-9_.-]{2,119}$'
  responses:
    Unauthenticated:
      description: Authentication is absent or invalid
      headers:
        X-Correlation-ID:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Forbidden:
      description: Actor lacks the required in-scope permission
      headers:
        X-Correlation-ID:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Resource is absent or outside current tenant scope
      headers:
        X-Correlation-ID:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: Lifecycle, concurrency, uniqueness, or idempotency conflict
      headers:
        X-Correlation-ID:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    ValidationFailed:
