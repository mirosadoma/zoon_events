openapi: 3.1.1
info:
  title: Zonetec Foundation API
  version: 1.0.0
  summary: Zonetec foundation, registration, ticketing, payment, and credential contract
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
  description: |
    Contract-first API for Zonetec Phase 0 and Phase 1. Kiosks/scanners, check-in,
    wallets, ACS, identity verification, marketplace behavior, and venue-asset
    rentals are not included.
servers:
  - url: /api/v1
    description: Current deployment
tags:
  - name: Health
    description: Minimal public and authorized operational health checks.
  - name: Authentication
    description: API token lifecycle and current actor context.
  - name: Platform Tenants
    description: Explicit privileged tenant provisioning and lifecycle operations.
  - name: Platform Users
    description: Controlled workforce and service-user provisioning.
  - name: Platform Access
    description: Governed platform roles, permissions, and assignments.
  - name: Platform Operations
    description: Authorized platform health and audit operations.
  - name: Tenant Memberships
    description: Tenant-scoped user membership lifecycle.
  - name: Tenant Roles
    description: Tenant-scoped roles, permissions, and assignments.
  - name: Tenant Audit
    description: Tenant-scoped audit search, export, and integrity verification.
  - name: Feature Flags
    description: Governed platform definitions, effective tenant values, and tenant overrides.
  - name: Configuration
    description: Read-only Phase 0 configuration schemas and validated tenant values.
  - name: Public Registration
    description: Attendee event discovery, registration, checkout, and order status.
  - name: Events
    description: Tenant event setup and lifecycle.
  - name: Registration Forms
    description: Versioned event registration form management.
  - name: Ticketing
    description: Ticket types, inventory, and scheduled pricing.
  - name: Orders
    description: Organizer order review and refund operations.
  - name: Attendees
    description: Tenant-scoped attendee review and correction.
  - name: Credentials
    description: Signed credential validation, revocation, and reissue.
paths:
  /public/events/{event_slug}:
    $ref: '../../002-registration-ticketing-credentials/contracts/openapi.yaml#/paths/~1public~1events~1{event_slug}'
  /public/events/{event_slug}/registration-form:
    $ref: '../../002-registration-ticketing-credentials/contracts/openapi.yaml#/paths/~1public~1events~1{event_slug}~1registration-form'
  /public/events/{event_slug}/registrations:
    $ref: '../../002-registration-ticketing-credentials/contracts/openapi.yaml#/paths/~1public~1events~1{event_slug}~1registrations'
  /public/orders/{public_reference}:
    $ref: '../../002-registration-ticketing-credentials/contracts/openapi.yaml#/paths/~1public~1orders~1{public_reference}'
  /public/orders/{public_reference}/payment-intents:
    $ref: '../../002-registration-ticketing-credentials/contracts/openapi.yaml#/paths/~1public~1orders~1{public_reference}~1payment-intents'
  /tenant/events:
    $ref: '../../002-registration-ticketing-credentials/contracts/openapi.yaml#/paths/~1tenant~1events'
  /tenant/events/{event_id}:
    $ref: '../../002-registration-ticketing-credentials/contracts/openapi.yaml#/paths/~1tenant~1events~1{event_id}'
  /tenant/events/{event_id}/publish:
    $ref: '../../002-registration-ticketing-credentials/contracts/openapi.yaml#/paths/~1tenant~1events~1{event_id}~1publish'
  /tenant/events/{event_id}/cancel:
    $ref: '../../002-registration-ticketing-credentials/contracts/openapi.yaml#/paths/~1tenant~1events~1{event_id}~1cancel'
  /tenant/events/{event_id}/registration-form:
    $ref: '../../002-registration-ticketing-credentials/contracts/openapi.yaml#/paths/~1tenant~1events~1{event_id}~1registration-form'
  /tenant/events/{event_id}/registration-form/publish:
    $ref: '../../002-registration-ticketing-credentials/contracts/openapi.yaml#/paths/~1tenant~1events~1{event_id}~1registration-form~1publish'
  /tenant/events/{event_id}/ticket-types:
    $ref: '../../002-registration-ticketing-credentials/contracts/openapi.yaml#/paths/~1tenant~1events~1{event_id}~1ticket-types'
  /tenant/events/{event_id}/ticket-types/{ticket_type_id}:
    $ref: '../../002-registration-ticketing-credentials/contracts/openapi.yaml#/paths/~1tenant~1events~1{event_id}~1ticket-types~1{ticket_type_id}'
  /tenant/events/{event_id}/ticket-types/{ticket_type_id}/price-tiers:
    $ref: '../../002-registration-ticketing-credentials/contracts/openapi.yaml#/paths/~1tenant~1events~1{event_id}~1ticket-types~1{ticket_type_id}~1price-tiers'
  /tenant/events/{event_id}/orders:
    $ref: '../../002-registration-ticketing-credentials/contracts/openapi.yaml#/paths/~1tenant~1events~1{event_id}~1orders'
  /tenant/events/{event_id}/orders/{order_id}/refunds:
    $ref: '../../002-registration-ticketing-credentials/contracts/openapi.yaml#/paths/~1tenant~1events~1{event_id}~1orders~1{order_id}~1refunds'
  /tenant/events/{event_id}/attendees:
    $ref: '../../002-registration-ticketing-credentials/contracts/openapi.yaml#/paths/~1tenant~1events~1{event_id}~1attendees'
  /tenant/events/{event_id}/attendees/{attendee_id}:
    $ref: '../../002-registration-ticketing-credentials/contracts/openapi.yaml#/paths/~1tenant~1events~1{event_id}~1attendees~1{attendee_id}'
  /tenant/events/{event_id}/credentials/{credential_id}/revoke:
    $ref: '../../002-registration-ticketing-credentials/contracts/openapi.yaml#/paths/~1tenant~1events~1{event_id}~1credentials~1{credential_id}~1revoke'
  /tenant/events/{event_id}/credentials/{credential_id}/reissue:
    $ref: '../../002-registration-ticketing-credentials/contracts/openapi.yaml#/paths/~1tenant~1events~1{event_id}~1credentials~1{credential_id}~1reissue'
  /tenant/credential-validations:
    $ref: '../../002-registration-ticketing-credentials/contracts/openapi.yaml#/paths/~1tenant~1credential-validations'
  /health/live:
    get:
      tags: [Health]
      operationId: getLiveness
      summary: Check process availability
      security: []
      responses:
        '200':
          description: Process can answer requests
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicHealth'
              example:
                status: ok
        4XX:
          $ref: '#/components/responses/ValidationFailed'
  /health/ready:
    get:
      tags: [Health]
      operationId: getReadiness
      summary: Check minimal service readiness
      description: Returns aggregate readiness without dependency or configuration details.
      security: []
      responses:
        '200':
          description: Service is ready
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicHealth'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        4XX:
          $ref: '#/components/responses/ValidationFailed'
  /auth/token:
    post:
      tags: [Authentication]
      operationId: issueAuthToken
      summary: Authenticate an administratively provisioned user
      description: Audits `auth.token.issued`, `auth.failed`, or `auth.locked_out`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '200':
          description: Token issued; plaintext token is shown once
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /auth/token/current:
    delete:
      tags: [Authentication]
      operationId: revokeCurrentAuthToken
      summary: Revoke the token used for this request
      description: Audits `auth.token.revoked`.
      security:
        - sanctum: []
      responses:
        '204':
          description: Token revoked
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /auth/me:
    get:
      tags: [Authentication]
      operationId: getCurrentUser
      summary: Get the authenticated user
      security:
        - sanctum: []
      responses:
        '200':
          description: Current user
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          $ref: '#/components/responses/Unauthenticated'
  /auth/tenants:
    get:
      tags: [Authentication]
      operationId: listCurrentUserTenants
      summary: List active tenant memberships available to the current user
      security:
        - sanctum: []
      responses:
        '200':
          description: Active tenant choices; permissions are not combined across tenants
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantChoiceCollection'
        '401':
          $ref: '#/components/responses/Unauthenticated'
  /platform/tenants:
    get:
      tags: [Platform Tenants]
      operationId: listPlatformTenants
      summary: List tenants
      description: Requires `platform.tenant.view`.
      security:
        - sanctum: []
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Tenant collection
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantCollection'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Platform Tenants]
      operationId: createTenant
      summary: Create a tenant
      description: Requires `platform.tenant.manage`; audits `tenant.created`.
      security:
        - sanctum: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantRequest'
      responses:
        '201':
          description: Tenant created
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantEnvelope'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /platform/tenants/{tenant_id}:
    parameters:
      - $ref: '#/components/parameters/TenantPathId'
    get:
      tags: [Platform Tenants]
      operationId: getPlatformTenant
      summary: Get a tenant
      description: Requires `platform.tenant.view`; privileged tenant access is audited.
      security:
        - sanctum: []
      responses:
        '200':
          description: Tenant
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantEnvelope'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Platform Tenants]
      operationId: updateTenantLifecycle
      summary: Update tenant profile or lifecycle status
      description: Requires `platform.tenant.manage`, an explicit reason, and tenant lifecycle audit.
      security:
        - sanctum: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTenantRequest'
      responses:
        '200':
          description: Tenant updated
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantEnvelope'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /platform/users:
    get:
      tags: [Platform Users]
      operationId: listPlatformUsers
      summary: List administratively provisioned users
      description: Requires `platform.user.view`.
      security:
        - sanctum: []
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: User collection
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCollection'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Platform Users]
      operationId: provisionUser
      summary: Provision a workforce or service user
      description: Requires `platform.user.manage`; no public registration is provided.
      security:
        - sanctum: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProvisionUserRequest'
      responses:
        '201':
          description: User provisioned
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /platform/users/{user_id}:
    parameters:
      - $ref: '#/components/parameters/UserPathId'
    patch:
      tags: [Platform Users]
      operationId: updatePlatformUserLifecycle
      summary: Update an administratively provisioned user
      description: Requires `platform.user.manage`; lifecycle changes revoke access as required and are audited.
      security:
        - sanctum: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /platform/roles:
    get:
      tags: [Platform Access]
      operationId: listPlatformRoles
      summary: List platform roles
      description: Requires platform access-management permission.
      security:
        - sanctum: []
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Platform role collection
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformRoleCollection'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Platform Access]
      operationId: createPlatformRole
      summary: Create a deny-by-default platform role
      description: Requires platform access-management permission; no permissions are granted implicitly.
      security:
        - sanctum: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        '201':
          description: Platform role created and audited
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformRoleEnvelope'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /platform/roles/{role_id}:
    parameters:
      - $ref: '#/components/parameters/RolePathId'
    patch:
      tags: [Platform Access]
      operationId: updatePlatformRole
      summary: Update a platform role and its explicit permissions
      description: Requires platform access-management permission; system-role protections apply.
      security:
        - sanctum: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePlatformRoleRequest'
      responses:
        '200':
          description: Platform role updated and audited
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformRoleEnvelope'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /platform/role-assignments:
    post:
      tags: [Platform Access]
      operationId: createPlatformRoleAssignment
      summary: Assign a platform role to a user
      description: Requires platform access-management permission and creates privileged audit evidence.
      security:
        - sanctum: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlatformRoleAssignmentRequest'
      responses:
        '201':
          description: Platform role assigned and audited
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformRoleAssignmentEnvelope'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /platform/role-assignments/{assignment_id}:
    parameters:
      - $ref: '#/components/parameters/AssignmentPathId'
    delete:
      tags: [Platform Access]
      operationId: revokePlatformRoleAssignment
      summary: Revoke a platform role assignment
      description: Requires platform access-management permission and cannot remove the final recoverable platform administrator.
      security:
        - sanctum: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Platform assignment revoked and audited
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /platform/health:
    get:
      tags: [Platform Operations]
      operationId: getDetailedHealth
      summary: Get categorized operational health
      description: Requires `operations.health.view`; never returns secrets or connection details.
      security:
        - sanctum: []
      responses:
        '200':
          description: Detailed safe health
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailedHealthEnvelope'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
  /platform/audit-logs:
    get:
      tags: [Platform Operations]
      operationId: listPlatformAuditLogs
      summary: Search platform-scope audit records
      description: Requires `platform.audit.view`; the search is audited.
      security:
        - sanctum: []
      parameters:
        - $ref: '#/components/parameters/From'
        - $ref: '#/components/parameters/To'
        - $ref: '#/components/parameters/AuditAction'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Platform audit collection
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditCollection'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /tenant/memberships:
    parameters:
      - $ref: '#/components/parameters/TenantHeader'
    get:
      tags: [Tenant Memberships]
      operationId: listTenantMemberships
      summary: List tenant memberships
      description: Requires `membership.view`.
      security:
        - sanctum: []
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Membership collection
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipCollection'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Tenant Memberships]
      operationId: createTenantMembership
      summary: Add an existing user to the tenant
      description: Requires `membership.manage`; audits `membership.created`.
      security:
        - sanctum: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMembershipRequest'
      responses:
        '201':
          description: Membership created
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipEnvelope'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /tenant/memberships/{membership_id}:
    parameters:
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/MembershipPathId'
    patch:
      tags: [Tenant Memberships]
      operationId: updateTenantMembership
      summary: Change membership lifecycle status
